<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="news.css">
	<title>NewsLettr</title>
</head>
<body>

	<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<h1>News Letter !</h1>
<hr>

<form>
	<h2>Send Emails</h2>
	<input type="radio" name="yr" id="yr1">
	<label for="yr1">Weekly Twice</label><br>
	<input type="radio" name="yr" id="yr1">
	<label for="yr2">Weekly Once</label><br>
	<input type="radio" name="yr" id="yr1">
	<label for="yr3">Monthly Once</label><br>
	<input type="radio" name="yr" id="yr1">
	<label for="yr4">Monthly Twice</label>

	<h2>E-mail</h2>
	<input type="text" name="name" id="nme"><br>

 <h2>Recommend Mails</h2>
 <input type="checkbox" id="box1">
 <label for="box1">New Post Remainder</label><br>
 <input type="checkbox" id="box2"><br>
 <label for="box2">Photography Tips!</label><br>
 <input type="checkbox" id="box3"><br>
 <label for="box3">New Presets</label>
 
 <h2>Feedback</h2>
 <textarea id="area" name="txtarea" rows="4" cols="50">Write your comments here!</textarea>

	<input type="submit" name="submit" id="submit">


</form>

</body>
</html>
